services:
# DATABASE SERVICE
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: hateshield
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    depends_on:
      - db
      - ml

  ml:
    build: ./ml-service
    ports:
      - "5001:5000"

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
