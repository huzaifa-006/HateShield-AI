version: "3.9"

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: hateshield
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    depends_on:
      - db

  ml:
    build: ./ml-service
    ports:
      - "5000:5000"

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
